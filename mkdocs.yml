site_name: Gemini CLI Telegram
site_description: Telegram bridge for Gemini CLI, with sane defaults and no fake magic.
site_url: https://docs.example.com
theme:
  name: material
  palette:
    primary: teal
    accent: lime
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: docs/index.md
  - Install: docs/install.md
  - Setup: docs/setup.md
  - Commands: docs/commands.md
  - Architecture: docs/architecture.md
  - Roadmap: docs/roadmap.md
  - Modes: docs/modes.md
  - Troubleshooting: docs/troubleshooting.md
  - Security: docs/security.md
